# glossary.yaml
# Plain-language meaning for every card metric - skater and goalie - written in
# OUR OWN WORDS. Nothing here is copied from hockeystats.com; it is the reading
# methodology distilled by hand, the same as interpretation.yaml.
#
# One entry per card metric. Each entry has two content fields:
#   definition - what the metric measures, in plain language.
#   caveat     - the single most important interpretive note for it.
# `aliases` are lookup keys for explain_metric (the schema field name plus common
# natural phrasings); the canonical field name itself always resolves.
#
# Single source of truth: where a metric's most important caveat is one the engine
# already attaches (finishing volatility, goalie consistency, deployment, dangerous
# passing, rebound control), the entry uses `caveat_ref` - a dotted path into
# interpretation.yaml - instead of retyping the sentence. The caveat lives in one
# place and the glossary points at it. Every entry has exactly one of `caveat` /
# `caveat_ref`.

metrics:
  # --- Shared ---------------------------------------------------------------
  proj_war_pct:
    aliases:
      ["war", "proj war", "projected war", "projected war percentile",
       "overall value", "wins above replacement", "overall rating", "how good is he"]
    definition: >-
      His projected Wins Above Replacement as a percentile against others at his
      position - the model's single best estimate of total on-ice value for next
      season, blending every component below into one number. Zero WAR
      (replacement level) sits at roughly the 37th percentile.
    caveat_ref: war_reading.point_estimate

  # --- Skater: deployment (context, not value) ------------------------------
  competition:
    aliases:
      ["competition", "competition faced", "quality of competition", "opposition",
       "tough minutes", "who he plays against", "matched against top lines"]
    definition: >-
      The quality of the opposition he is matched against - how tough the players
      he lines up against are, as a percentile.
    caveat_ref: caveats.deployment_not_value
  teammates:
    aliases:
      ["teammates", "quality of teammates", "linemates", "who he plays with",
       "help", "carried by his linemates"]
    definition: >-
      The quality of the linemates and partners he plays with - how much on-ice
      help he gets, as a percentile.
    caveat_ref: caveats.deployment_not_value

  # --- Skater: WAR components -----------------------------------------------
  ev_offense:
    aliases:
      ["ev offense", "even strength offense", "5v5 offense", "play driving offense",
       "offensive impact", "drives offense", "even strength offensive impact"]
    definition: >-
      His even-strength offensive impact - his isolated effect on the expected
      goals (scoring chances) his team creates while he is on the ice, isolated
      by regression (RAPM) that adjusts for teammates, opponents, zone starts,
      score state, home ice, back-to-backs, and shifts starting off an expiring
      power play. Even strength here means 5v5, 4v4, or 3v3 with both goalies
      in net - empty-net play is excluded. Play-driving, not his own point
      total.
    caveat: >-
      Repeatable play-driving (the part that carries year to year) and an on-ice
      impact, not individual scoring - he can drive offense without filling his
      own scoresheet.
  ev_defense:
    aliases:
      ["ev defense", "even strength defense", "5v5 defense", "defensive impact",
       "two way", "shutdown", "defensive play driving", "suppresses chances"]
    definition: >-
      His even-strength defensive impact - his isolated effect on the expected
      goals (scoring chances) his team allows while he is on the ice, isolated
      by regression (RAPM) that adjusts for teammates, opponents, zone starts,
      score state, home ice, back-to-backs, and shifts starting off an expiring
      power play. Even strength here means 5v5, 4v4, or 3v3 with both goalies
      in net - empty-net play is excluded.
    caveat_ref: caveats.defense_repeatability
  pp:
    aliases:
      ["pp", "power play", "power play offense", "man advantage",
       "on the power play", "pp1", "special teams offense"]
    definition: >-
      His on-ice value on the power play - how much he adds to the team's
      man-advantage offense, as a percentile (NA when he has no power-play role).
    caveat: >-
      A role stat: NA means he does not play the power play - an absence of usage,
      not a weakness - and never a zero. Already part of WAR, and the noisiest of
      the six components: the expected-goal model underneath is at its weakest on
      the power play, so give PP reads extra slack.
  pk:
    # "penalty kill" (the bare phrase) resolves to the goalie `penalty_kill` metric,
    # which is literally named that; a skater's PK role is reached here via "pk".
    aliases:
      ["pk", "shorthanded", "kills penalties", "penalty killer", "pk role"]
    definition: >-
      His on-ice value killing penalties - how much he helps suppress chances
      shorthanded, as a percentile (NA when he has no penalty-kill role).
    caveat: >-
      A role stat: NA means no penalty-kill role - an absence of usage, not a
      weakness. Do not read a missing PK as a zero. And give PK reads extra
      slack: penalty-kill defense is measured against power-play shots, where
      the expected-goals model is at its weakest.
  finishing:
    aliases:
      ["finishing", "finish", "finisher", "sniper", "conversion",
       "shooting talent", "scores goals", "goal scorer", "shooting percentage skill"]
    definition: >-
      How well he converts his chances into goals relative to an average shooter
      from the same locations - finishing talent layered on top of shot volume,
      not the volume itself.
    caveat_ref: caveats.finishing_volatility
  penalties:
    aliases:
      ["penalties", "discipline", "penalty differential", "takes too many penalties",
       "undisciplined", "draws penalties", "stays out of the box"]
    definition: >-
      His discipline - his penalty differential (the non-offsetting penalties he
      draws versus the ones he takes), as a percentile, where a higher mark helps
      his team's special-teams margin. The model prices a penalty minute at about
      0.11 goals, and a drawn penalty helps both ways: power-play time gained, and
      the opponent scoring less on the kill than at even strength.
    caveat: >-
      Oriented so higher is better (more disciplined, draws more than he takes); a
      low mark is an undisciplined flag, not a lack of physicality. Do not invert
      it.

  # --- Skater: descriptive colour -------------------------------------------
  goals:
    aliases:
      ["goals", "goal rate", "goal scoring", "how many goals", "individual goals",
       "goals per 60"]
    definition: >-
      His individual goal-scoring rate as a percentile - how often he personally
      scores, before any teammate or competition adjustment.
    caveat: >-
      Descriptive colour, not a value verdict - raw output that does not separate
      his own finishing from the chances his linemates create. Read it alongside
      EV offense and finishing, never alone.
  first_assists:
    aliases:
      ["first assists", "primary assists", "playmaking", "passer", "setup passes",
       "the last pass", "sets up goals", "vision", "primary helpers"]
    definition: >-
      His primary-assist rate as a percentile - how often he makes the pass that
      directly sets up a goal (the last pass before the shot).
    caveat_ref: caveats.dangerous_passing

  # --- Goalie: workload ------------------------------------------------------
  gp_pct:
    aliases:
      ["gp", "games played", "workload", "starts", "how much he plays",
       "games played percentile", "workhorse load"]
    definition: >-
      His games-played percentile - how much of the net he actually carries, a
      workload marker for the role he is given.
    caveat: >-
      Workload and deployment, not quality - a heavy or light load describes how
      he is used, not how well he stops pucks. Kept separate from the value
      metrics.

  # --- Goalie: save performance by game state -------------------------------
  even_strength:
    aliases:
      ["even strength saves", "5v5 saves", "even strength save performance",
       "even strength goaltending", "saves at even strength"]
    definition: >-
      His save performance at five-on-five - goals saved above expected on
      even-strength shots, as a percentile.
    caveat: >-
      Built on goals saved above expected (shot quality already accounted for),
      not raw save percentage - it credits the difficulty of what he faced.
  penalty_kill:
    aliases:
      ["penalty kill saves", "shorthanded saves", "pk save performance",
       "saves on the penalty kill", "shorthanded goaltending", "pk save rate"]
    definition: >-
      His save performance while shorthanded - goals saved above expected on the
      penalty kill, as a percentile.
    caveat: >-
      A goaltending metric (goals saved above expected shorthanded), not the
      skaters' penalty kill - it isolates the goalie's own part of killing
      penalties. It is also the noisiest goalie read: shorthanded saves are
      measured against power-play shots, where the expected-goals model is at
      its weakest.

  # --- Goalie: save performance by shot danger ------------------------------
  high_danger:
    aliases:
      ["high danger", "high danger saves", "high danger save percentage",
       "hard saves", "dangerous chances", "slot saves", "in tight saves"]
    definition: >-
      His save performance on high-danger shots - goals saved above expected on
      the most dangerous chances (slot, rebounds, in-tight), as a percentile.
    caveat: >-
      One leg of the danger profile: strong high-danger with ordinary low-danger
      means he makes the hard saves but is average on routine ones. Read the three
      danger levels together.
  med_danger:
    aliases:
      ["med danger", "medium danger", "mid danger saves", "medium danger saves",
       "middle danger"]
    definition: >-
      His save performance on medium-danger shots - goals saved above expected on
      the middle band of chance quality, as a percentile.
    caveat: >-
      The middle of the danger profile - most useful read next to high- and
      low-danger, not on its own.
  low_danger:
    aliases:
      ["low danger", "low danger saves", "routine shots", "easy saves",
       "soft goals", "leaks easy goals", "low danger save percentage"]
    definition: >-
      His save performance on low-danger shots - goals saved above expected on the
      routine, lower-quality shots he is expected to stop, as a percentile.
    caveat: >-
      Weak low-danger is a leaking-soft-goals flag - those are the shots a goalie
      should handle, so a low mark here matters more than the shot quality
      suggests.

  # --- Goalie: start quality -------------------------------------------------
  quality_starts:
    aliases:
      ["quality starts", "floor", "reliability", "gives you a chance", "steady",
       "dependable starts", "reliable"]
    definition: >-
      How often he gives his team a fair chance to win - his rate of starts where
      he saved at least as many goals as expected (goals saved above expected at
      or above zero), as a percentile. The floor of his game.
    caveat: >-
      The floor of the start-quality profile (reliability), distinct from the
      ceiling - pair it with excellent and bad starts; a high floor with a modest
      ceiling is reliability over game-stealing.
  excellent_starts:
    aliases:
      ["excellent starts", "ceiling", "game stealer", "steals games", "robs people",
       "highlight reel", "larceny", "stolen games"]
    definition: >-
      His rate of game-stealing starts - nights he saved roughly two or more goals
      above expected, strong enough to win his team a game on his own, as a
      percentile. The ceiling.
    caveat: >-
      The ceiling of the start-quality profile (can he steal games), not the
      floor - a modest mark means dependable but not a game-stealer. Read it with
      quality starts.
  bad_starts:
    aliases:
      ["bad starts", "bad starts avoided", "no stinkers", "never has a stinker",
       "disaster rate", "blowups", "no bad nights", "avoids disasters"]
    definition: >-
      How rarely he has a disaster outing - his rate of bad starts (nights he
      allowed about two or more goals above expected), oriented so a higher
      percentile means fewer of them.
    caveat: >-
      Oriented so higher is better - a high mark means he rarely melts down, NOT
      that he has many bad nights. Do not invert it.

  # --- Goalie: reliability and puck handling --------------------------------
  rebound_control:
    aliases:
      ["rebound control", "rebounds", "controls rebounds", "second chances",
       "no second chances", "puck control", "rebound suppression"]
    definition: >-
      How well he controls rebounds - steering pucks to safe areas and limiting
      second-chance shots, as a percentile.
    caveat_ref: goalie_rules.rebound_control
  consistency:
    aliases:
      ["consistency", "consistent", "predictability", "you know what you'll get",
       "stable", "volatility", "predictable year to year"]
    definition: >-
      How predictable he is from year to year - a percentile for the stability of
      his results, not how good those results are.
    caveat_ref: goalie_rules.consistency_volatility

  # ==========================================================================
  # Microstat ($10-tier) card metrics - single-season 5v5 per-60 percentiles.
  # Microstats tracked by AllThreeZones; Skating Speed from NHL Edge tracking.
  # All definitions reworded in our own words, same as everything above.
  # `primary_assists` (the micro card's spelling) resolves to the existing
  # `first_assists` entry via its alias - same stat, no duplicate entry.
  # ==========================================================================

  # --- Micro: shooting ------------------------------------------------------
  chances:
    aliases:
      ["chances", "scoring chances", "chance rate", "legitimate chances",
       "chances per 60"]
    definition: >-
      His rate of shot attempts judged to be legitimate scoring chances. The
      split matters enormously: players in this dataset score on about 15.6% of
      chances versus 1.4% of everything else.
    caveat: >-
      Read it against Shots - a player whose chances outpace his raw attempts is
      selective and dangerous; one whose attempts outpace his chances is living
      on the perimeter.
  shots:
    aliases:
      ["shot attempts", "shot volume", "attempts", "shoots a lot",
       "shots per 60"]
    definition: >-
      His rate of all shot attempts, dangerous or not - pure volume from
      anywhere on the ice.
    caveat: >-
      Volume alone says little: grading higher in Shots than in Chances usually
      means perimeter attempts, while the reverse means he picks his spots.
  in_zone_shots:
    aliases:
      ["in zone shots", "cycle shots", "shots off the cycle",
       "in-zone shot attempts"]
    definition: >-
      His rate of shot attempts generated from in-zone possession - cycles and
      forechecks - rather than off the rush; everything that isn't a rush
      attempt.
    caveat_ref: caveats.micro_unadjusted
  rush_shots:
    aliases:
      ["rush shots", "shots off the rush", "rush attempts"]
    definition: >-
      His rate of shot attempts off the rush - a controlled entry turning
      quickly and directly into an attempt.
    caveat_ref: caveats.micro_unadjusted
  shots_off_hd_passes:
    aliases:
      ["shots off hd passes", "shots off high danger passes",
       "shots off slot passes", "one timers off slot passes"]
    definition: >-
      His rate of shot attempts taken directly off high-danger passes - feeds
      from behind the net or across the slot. A high mark means he gets himself
      to dangerous scoring areas, usually alongside skilled playmakers.
    caveat: >-
      The closest thing on any card to a net-front read - it marks a player
      getting to dangerous areas - but literal shot location and screens still
      aren't tracked.
  zone_entries:
    aliases:
      ["zone entries", "entries per 60 (f)", "carries it in", "dump and chase entries"]
    definition: >-
      His rate of offensive-zone entries - carrying the puck across the line or
      dumping it in.
    caveat_ref: caveats.micro_unadjusted
  # INFERRED - the site publishes no official definition for this box (checked
  # 2026-07-18); the read is inferred from the card's documented tracking
  # conventions and is canonical here. See DECISIONS.md.
  entries_w_possession:
    aliases:
      ["entries with possession", "controlled entries", "possession entries",
       "carries the puck in with control"]
    definition: >-
      His rate of controlled zone entries - gaining the line with the puck
      (carried or passed in) rather than dumping it in.
    caveat: >-
      No official definition is published for this box - the read is inferred
      from the card's documented tracking conventions; controlled entries are the
      valuable kind, so read this alongside raw Zone Entries for the
      carry-vs-dump shape.

  # --- Micro: passing -------------------------------------------------------
  chance_assists:
    aliases:
      ["chance assists", "passes to chances", "sets up scoring chances",
       "chance assist rate"]
    definition: >-
      His rate of passes leading directly to a legitimate scoring chance -
      setup passes that put a teammate in a scoring position and get the goalie
      moving before the shot.
    caveat: >-
      The high-value half of the passing profile - read it against Primary Shot
      Assists to see whether his passes create danger or just feed volume.
  primary_shot_assists:
    aliases:
      ["primary shot assists", "shot assists", "passes to attempts",
       "feeds the point"]
    definition: >-
      His rate of passes leading directly to any shot attempt, dangerous or
      not.
    caveat: >-
      Grading higher here than in Chance Assists usually means funneling pucks
      low-to-high toward the point - good for sustaining possession, but shots
      off those passes go in only about 2.5% of the time, so the ceiling is
      much lower than it looks.
  in_zone_shot_assists:
    aliases:
      ["in zone shot assists", "cycle assists", "passes off the cycle"]
    definition: >-
      His rate of passes leading directly to shot attempts out of in-zone
      possession - cycles and forechecks.
    caveat_ref: caveats.micro_unadjusted
  rush_shot_assists:
    aliases:
      ["rush shot assists", "passes off the rush", "transition assists"]
    definition: >-
      His rate of passes leading directly to shot attempts off the rush -
      feeding a teammate in transition.
    caveat_ref: caveats.micro_unadjusted
  high_danger_passes:
    aliases:
      ["high danger passes", "slot passes", "passes across the slot",
       "royal road passes", "passes from behind the net"]
    definition: >-
      His rate of passes into the slot from behind the net or across it - the
      most dangerous passes in hockey, the ones that move goalies and precede
      goals.
    caveat: >-
      A player who generates these at a high rate is likely to beat his
      expected-goals numbers - this is exactly the dangerous-passing shape the
      model is known to underrate.
  zone_exits:
    aliases:
      ["zone exits", "exits the zone", "breakouts (f)"]
    definition: >-
      His rate of defensive-zone exits - carrying, passing, or clearing the
      puck out. Forwards who grade well here are active coming back for pucks
      in their own end.
    caveat_ref: caveats.micro_unadjusted
  # INFERRED - the site publishes no official definition for this box (checked
  # 2026-07-18); the read is inferred from the card's documented tracking
  # conventions and is canonical here. See DECISIONS.md.
  exits_w_possession:
    aliases:
      ["exits with possession", "controlled exits", "possession exits",
       "clean breakouts"]
    definition: >-
      His rate of controlled zone exits - getting the puck out while keeping
      it, by carrying it across the line or passing cleanly to a teammate,
      rather than flipping it out.
    caveat: >-
      No official definition is published for this box - the read is inferred
      from the card's documented tracking conventions; read it against raw Zone Exits
      for the control-vs-clear shape.

  # --- Micro: composite and style -------------------------------------------
  skating_speed:
    aliases:
      ["skating speed", "speed", "skating", "fast", "top speed", "bursts",
       "how fast is he"]
    definition: >-
      A percentile built from NHL Edge tracking data - a blend of top speed and
      how often he hits 20+ mph bursts. It reads both how fast he can skate and
      how often he actually gets there.
    caveat: >-
      The one non-AllThreeZones number on the card, and a style read, not
      value: speed is how he plays, and a modest mark is never itself a
      weakness.
  chance_contributions:
    aliases:
      ["chance contributions", "chances plus chance assists",
       "total chance creation"]
    definition: >-
      His chances and chance assists combined - one number for how much
      dangerous offense he is directly involved in creating, shot or pass.
    caveat_ref: caveats.micro_unadjusted
  shot_contributions:
    aliases:
      ["shot contributions", "shots plus shot assists", "total shot involvement"]
    definition: >-
      His shot attempts and primary shot assists combined - total involvement
      in generating attempts of any quality.
    caveat: >-
      A volume composite: read it against Chance Contributions to see whether
      the involvement is dangerous or just busy.
  in_zone_offense:
    aliases:
      ["in zone offense", "cycle offense", "in-zone attempts plus assists",
       "offensive zone possession offense"]
    definition: >-
      His in-zone shot attempts and in-zone shot assists combined - how much of
      his offense comes from sustained o-zone possession, cycles, and
      forechecks.
    caveat: >-
      One half of the style axis - read it against Rush Offence for the
      rush-vs-cycle shape; neither side of that axis is itself value.
  rush_offense:
    aliases:
      ["rush offense", "transition offense", "rush attempts plus assists",
       "offense off the rush"]
    definition: >-
      His rush shot attempts and rush shot assists combined - how much of his
      offense comes directly off controlled entries in transition.
    caveat: >-
      One half of the style axis - read it against In-Zone Offence for the
      rush-vs-cycle shape; neither side of that axis is itself value.
  forecheck_involvement:
    aliases:
      ["forecheck involvement", "forechecking", "puck pressure",
       "o-zone puck recoveries", "hounds the puck"]
    definition: >-
      His rate of offensive-zone loose-puck recoveries plus forecheck pressures
      on opponents trying to exit - how involved he is digging out pucks and
      harassing defenders.
    caveat: >-
      A style read, not value - and only the offensive-zone slice of "motor":
      wall battles, stick checks, and pursuit elsewhere on the ice aren't
      tracked, so an ordinary mark here does not mean an ordinary compete
      level.
  hits:
    aliases:
      ["hits", "body checks", "physicality", "throws the body", "hitting"]
    definition: >-
      His body-check rate, counted in away games only to strip out home-scorer
      bias. For all the subjectivity of the stat, it repeats strongly year over
      year.
    caveat_ref: caveats.micro_style_not_value
  # INFERRED - the site publishes no official definition for this box (checked
  # 2026-07-18); the read is inferred from the card's documented tracking
  # conventions and is canonical here. See DECISIONS.md.
  d_zone_puck_touches:
    aliases:
      ["d zone puck touches", "defensive zone touches", "d-zone involvement",
       "touches in his own end"]
    definition: >-
      His rate of puck touches in the defensive zone - how often he is the one
      picking up or handling pucks in his own end, a marker of breakout
      involvement and defensive workload.
    caveat: >-
      No official definition is published for this box - the read is inferred
      from the card's documented tracking conventions; involvement is workload and
      trust, not by itself defensive quality.

  # --- Micro: defenseman production -----------------------------------------
  nz_shot_assists:
    aliases:
      ["nz shot assists", "neutral zone shot assists", "neutral zone feeds"]
    definition: >-
      His rate of passes from the neutral zone leading directly to a shot
      attempt - a defender giving his forwards chances in transition.
    caveat_ref: caveats.micro_unadjusted
  dz_shot_assists:
    aliases:
      ["dz shot assists", "defensive zone shot assists", "stretch passes",
       "stretch pass assists"]
    definition: >-
      His rate of passes from the defensive zone leading directly to a shot
      attempt - essentially stretch passes that turn straight into offense.
    caveat: >-
      The rarest pass on the card - a low percentile here is common and says
      little on its own; a high one marks a genuine stretch-pass weapon.
  passes:
    aliases:
      ["passes", "pass volume", "puck mover", "moves the puck", "pass rate"]
    definition: >-
      His rate of completed passes across all three zones - the volume marker
      for a puck-moving defenseman.
    caveat_ref: caveats.micro_unadjusted

  # --- Micro: defenseman transition -----------------------------------------
  entries:
    aliases:
      ["entries", "d entries", "joins the rush", "activates off the line"]
    definition: >-
      His rate of offensive-zone entries - a defenseman carrying or dumping the
      puck in himself rather than handing it off.
    caveat_ref: caveats.micro_unadjusted
  # INFERRED - the site publishes no official definition for this box (checked
  # 2026-07-18); the read is inferred from the card's documented tracking
  # conventions and is canonical here. See DECISIONS.md.
  entry_possession_rate:
    aliases:
      ["entry possession rate", "controlled entry rate", "carries it in (d)"]
    definition: >-
      The share of his zone entries made with possession - carried or passed in
      rather than dumped - shown as a percentile rank of that rate.
    caveat: >-
      No official definition is published for this box - the read is inferred
      from the card's documented tracking conventions; a rate underneath, so a
      low-volume entry player can post an extreme number on few attempts.
  exits:
    aliases:
      ["exits", "d exits", "breakouts", "gets it out"]
    definition: >-
      His rate of defensive-zone exits - carrying, passing, or clearing the
      puck out of his own end.
    caveat: >-
      Volume, not quality - read it with Exit Possession Rate and Exit Success
      Rate to see whether the exits keep the puck or just relieve pressure.
  exit_possession_rate:
    aliases:
      ["exit possession rate", "controlled exit rate", "exits with control"]
    definition: >-
      The share of his zone exits that keep possession - carried out or passed
      cleanly to a teammate - shown as a percentile rank of that rate.
    caveat: >-
      A percentage underneath the percentile: a low mark means he clears or
      dumps pucks out frequently rather than breaking out with control.
  exit_success_rate:
    aliases:
      ["exit success rate", "clean exits", "breakout success"]
    definition: >-
      The share of his exit attempts that actually get the puck out of the
      zone, shown as a percentile rank of that rate.
    caveat: >-
      The turnover flag of the exit trio - a low mark means he coughs the puck
      up in transition; read it with the possession rate for the full breakout
      picture.
  # INFERRED - the site publishes no official definition for this box (checked
  # 2026-07-18); the read is inferred from the card's documented tracking
  # conventions and is canonical here. See DECISIONS.md.
  pass_exits:
    aliases:
      ["pass exits", "breakout passes", "passes it out"]
    definition: >-
      His rate of zone exits executed by passing the puck out to a teammate.
    caveat: >-
      No official definition is published for this box - the read is inferred
      from the card's documented tracking conventions; read it with Carry Exits for
      the pass-vs-skate breakout shape.
  # INFERRED - the site publishes no official definition for this box (checked
  # 2026-07-18); the read is inferred from the card's documented tracking
  # conventions and is canonical here. See DECISIONS.md.
  carry_exits:
    aliases:
      ["carry exits", "skates it out", "carries the puck out"]
    definition: >-
      His rate of zone exits executed by skating the puck out of the zone
      himself.
    caveat: >-
      No official definition is published for this box - the read is inferred
      from the card's documented tracking conventions; read it with Pass Exits for
      the pass-vs-skate breakout shape.
  d_zone_retrievals:
    aliases:
      ["d zone retrievals", "retrievals", "loose puck recoveries",
       "picks up pucks"]
    definition: >-
      His rate of loose-puck recoveries in the defensive zone - how heavy a
      retrieval workload he carries turning defensive sequences into
      transition.
    caveat: >-
      Workload, not outcome - pair it with Retrieval Success to see whether the
      heavy lifting actually comes out clean.
  retrieval_success:
    aliases:
      ["retrieval success", "clean retrievals", "wins his retrievals"]
    definition: >-
      The rate at which his defensive-zone retrievals succeed - recovering the
      puck without turning it over under pressure - shown as a percentile.
    caveat: >-
      The quality half of the retrieval pair - a defender can be high-workload
      (many retrievals) and still leak turnovers here, or low-workload but
      clean.

  # --- Micro: defenseman rush defense and puck management -------------------
  success_per_poss_play:
    aliases:
      ["success per poss play", "success per possession play", "puck management",
       "plays made per touch", "turnover rate adjusted"]
    definition: >-
      The rate at which his possession plays - entries, exits, and retrievals -
      succeed, as a percentile. A workload-aware read of puck management that a
      raw giveaway count can't give you.
    caveat: >-
      Grading low here means turning the puck over at a high rate relative to
      how active he is - more damning than a giveaway total, which punishes
      active players for volume.
  entry_denial_rate:
    aliases:
      ["entry denial rate", "denies entries", "stops them at the line",
       "kills entries at the blue line"]
    definition: >-
      How often opponents' attempts to gain the zone die at his blue line -
      entries broken up outright with stick or body.
    caveat: >-
      One leg of the rush-defense trio - read it with possession prevention and
      chance prevention; denials alone can coexist with getting beaten once the
      line is gained.
  poss_entry_prevention:
    aliases:
      ["poss entry prevention", "possession entry prevention", "forces dump ins",
       "no controlled entries against"]
    definition: >-
      How often he keeps opponents from entering the zone with possession -
      forcing a give-up or a dump-in instead of a controlled entry.
    caveat: >-
      A gap read: a low mark means a soft gap conceding the line with the puck.
      Read it with the other two rush-defense metrics before calling the style
      good or bad.
  entry_chance_prevention:
    aliases:
      ["entry chance prevention", "keeps entries from becoming chances",
       "rush chance suppression", "kills the rush"]
    definition: >-
      How well he keeps opponents' zone entries from turning into scoring
      chances - the bottom line of rush defense.
    caveat: >-
      The most important of the three rush-defense metrics: strong denials with
      weak chance prevention reads as a tight gap that gets walked, while weak
      denials with strong chance prevention reads as a soft gap protecting the
      slot on purpose.

  # ==========================================================================
  # NHL Edge (nhl.com/nhl-edge) - supplemental league tracking, unrelated to
  # the card's model, ridden alongside a card via assess_player's edge_card.
  # Same rewording rule as everything above. Family entries cover the schema's
  # legend-table fields via aliases (field names normalize to lookup keys); a
  # few documented boxes not yet seen on a sampled page get definition-only
  # entries and NO schema field - extend the schema deliberately when a real
  # sample surfaces (see DECISIONS.md, 2026-07-21).
  # ==========================================================================

  # --- Edge: goalie -----------------------------------------------------------
  edge_save_pct:
    aliases:
      ["save_pct_all", "save_pct_high_danger", "save_pct_mid_range",
       "save_pct_long_range", "edge save percentage", "save percentage",
       "save percentage by zone", "save locations", "save location map"]
    definition: >-
      The share of shots on goal a goalie stops - saves divided by shots
      against - as shown on his NHL Edge page, overall and split by the puck's
      release distance: high-danger inside 29 feet of the center of the goal
      (bounded by the face-off dot lines), mid-range 29 to 43 feet, long-range
      beyond 43. Each legend row prints the league-average rate beside the
      player's. The zone maps alongside show save locations - the puck's
      position at the moment of release.
    caveat_ref: caveats.edge_different_source
  edge_counts:
    aliases:
      ["saves_all", "saves_high_danger", "saves_mid_range", "saves_long_range",
       "shots_against", "goals_against", "high_danger_goals_against",
       "saves", "shots against", "goals against", "edge counts",
       "high danger goals against"]
    definition: >-
      The raw counts on a goalie's Edge page - saves, shots against, and goals
      against, overall and by distance zone. Shots on goal only: blocked and
      missed shots are excluded.
    caveat_ref: caveats.edge_counts_workload
  pct_starts_over_900:
    aliases:
      ["pct starts over 900", "percentage of starts over .900",
       "starts over 900", "starts over .900", "raw start quality"]
    definition: >-
      The share of a goalie's starts in which he posted a raw save percentage
      above .900 - the Edge page's game-level floor read.
    caveat: >-
      Built on raw save percentage with no shot-quality adjustment - the
      card's start-quality boxes are goals-saved-above-expected based, so the
      two floors measure different things and can honestly disagree.
  edge_5v5_save_pct:
    aliases:
      ["5 on 5 save percentage", "five on five save percentage",
       "edge 5v5 save percentage", "5v5 save percentage close situations",
       "5v5 shots against per 60"]
    definition: >-
      Documented Edge variants of save percentage restricted to 5-on-5 play -
      including close-situation and last-10-games splits - plus 5-on-5 shots
      against and shots against per 60. Not yet seen on a sampled page, so no
      schema field carries them yet.
    caveat_ref: caveats.edge_different_source

  # --- Edge: skater -----------------------------------------------------------
  hardest_shot:
    aliases:
      ["hardest shot", "max shot speed", "hardest recorded shot",
       "shot speed"]
    definition: >-
      The fastest shot he has recorded this season, in miles per hour, from
      NHL Edge tracking.
    caveat_ref: caveats.edge_tools_not_value
  avg_shot_speed:
    aliases:
      ["avg shot speed", "average shot speed"]
    definition: >-
      His average speed across all recorded shot attempts, in miles per hour.
      Documented on NHL Edge but not yet seen on a sampled page, so no schema
      field carries it yet.
    caveat_ref: caveats.edge_tools_not_value
  max_skating_speed:
    aliases:
      ["max skating speed", "top sustained speed", "fastest skating speed",
       "max sustained skating speed"]
    definition: >-
      The fastest sustained skating speed he has recorded this season, in
      miles per hour, from NHL Edge tracking.
    caveat_ref: caveats.edge_tools_not_value
  most_miles_per_game:
    aliases:
      ["most miles per game", "most distance skated", "distance skated",
       "total distance skated", "miles skated", "most miles skated game"]
    definition: >-
      Workload and effort tracking - the most distance he has covered in a
      single game this season (the page also lists per-period and season-total
      variants). Shown on the page as Most Miles Skated, Game.
    caveat_ref: caveats.edge_tools_not_value
  edge_shots_on_goal:
    aliases:
      ["sog_all", "sog_high_danger", "sog_mid_range", "sog_long_range",
       "shots on goal", "shots on goal by zone", "shot location volume"]
    definition: >-
      His shots on goal, overall and by release-distance zone (the same
      high-danger, mid-range, and long-range bounds as the goalie page),
      benchmarked against the average for his position - forwards and
      defensemen are held to different baselines. Shots on goal only: blocked
      and missed attempts are excluded.
    caveat_ref: caveats.edge_counts_workload
  zone_time:
    aliases:
      ["zone_time_offensive", "zone_time_defensive", "zone_time_neutral",
       "zone time", "offensive zone time", "defensive zone time",
       "neutral zone time"]
    definition: >-
      The percentage of time the puck spends in each zone while he is on the
      ice and the clock is running, benchmarked against an NHL average that
      itself differs slightly by position. Percentiles are pre-oriented like
      everything else: less defensive-zone time than average ranks HIGH on the
      defensive row.
    caveat_ref: caveats.deployment_not_value
  zone_starts:
    aliases:
      ["zone starts", "offensive zone starts", "defensive zone starts",
       "neutral zone starts", "shift starts"]
    definition: >-
      Where his shifts begin - the face-off location (offensive, defensive, or
      neutral zone) at each shift start. Documented on NHL Edge but not yet
      seen on a sampled page, so no schema field carries it yet.
    caveat_ref: caveats.deployment_not_value
  skating_speed_bursts:
    aliases:
      ["skating speed bursts", "speed bursts", "20 mph bursts",
       "bursts over 20"]
    definition: >-
      How often he hits high-speed skating bursts (the 20-plus mph events NHL
      Edge counts). Documented on NHL Edge but not yet seen on a sampled page,
      so no schema field carries it yet.
    caveat_ref: caveats.edge_tools_not_value
  shot_attempt_differential:
    aliases:
      ["shot attempt differential", "shots on goal differential",
       "sog differential", "attempt differential"]
    definition: >-
      The difference between shot attempts (or shots on goal) for and against
      while he is on the ice. Documented on NHL Edge but not yet seen on a
      sampled page, so no schema field carries it yet.
    caveat: >-
      An on-ice differential, shaped by teammates, competition, and
      deployment - not an isolated impact like the card's RAPM components.
  shot_speed_range_totals:
    aliases:
      ["shot speed range totals", "shots by speed band"]
    definition: >-
      Counts of his shots grouped into speed bands. Documented on NHL Edge but
      not yet seen on a sampled page, so no schema field carries it yet.
    caveat_ref: caveats.edge_tools_not_value
