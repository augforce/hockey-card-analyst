# interpretation.yaml
# The HockeyStats / JFresh reading methodology, distilled once by hand into
# deterministic lookups (PLAN sections 5 and 7b). The server's behaviour comes
# from this file plus the glossary, NOT from any runtime call to an LLM or to
# HockeyStats.com. Tune the numbers and wording here without touching code.

# --- Percentile tier bands (PLAN section 5) -------------------------------
# Percentiles are compressed at the top, so the bands are deliberately uneven.
# Bands are inclusive on both ends and must tile 0..100 with no gaps/overlaps.
tiers:
  - {min: 95, max: 100, label: "Elite"}
  - {min: 85, max: 94,  label: "Excellent"}
  - {min: 70, max: 84,  label: "Strong"}
  - {min: 55, max: 69,  label: "Above average"}
  - {min: 45, max: 54,  label: "Average"}
  - {min: 30, max: 44,  label: "Below average"}
  - {min: 15, max: 29,  label: "Weak"}
  - {min: 0,  max: 14,  label: "Among the worst at the position"}

# Any percentile at or above `threshold` carries this note (PLAN section 5).
elite_compression:
  threshold: 95
  note: >-
    The top of the percentile scale is compressed: the gap from 95 to true
    elite (99-100) is large, so a 95 and a 99 are not the same player.

# --- Caveats the engine attaches automatically (PLAN section 5) ------------
caveats:
  finishing_volatility: >-
    Finishing swings year to year, while play-driving (the RAPM components) is
    more repeatable. A verdict built on finishing is shakier than one built on
    play-driving — and the model's own author notes the weighting likely
    overstates shooting relative to play-driving (ridge regression shrinks
    play-driving impacts toward average), so when the two disagree, lean
    toward the play-driving read.
  deployment_not_value: >-
    Competition and Teammates describe how a player is used, not how good he
    is. They are already baked into WAR, so they are never a strength or a
    weakness on their own. The impact components are also regression-adjusted
    for zone starts, score state, home ice, back-to-backs, and shifts that
    start off an expiring power play — so "his numbers are a deployment
    artifact" claims are largely priced in before the card is printed.
  defense_repeatability: >-
    This measures play-driving suppression of chances against — impact, not
    hits or blocked shots; a quiet, position-sound defender can rate higher
    than a big hitter. It is also the less repeatable half of a forward's
    play-driving: the model's own priors regress past defensive impact
    roughly twice as hard toward average as past offense, so lean on
    multi-year evidence before a strong defensive verdict on a forward.
  within_position_only: >-
    Percentiles are ranked within each position pool. Forward vs forward and D
    vs D are fair comparisons; skater vs goalie, or forward vs defenseman, is
    not apples to apples and must be refused or heavily caveated.
  dangerous_passing: >-
    This model is known to underrate forwards who make dangerous passes and to
    overrate shoot-first players — pre-shot movement doesn't fully show up in
    expected goals, and it cuts both ways: an elite passer's linemates post
    finishing numbers that run hot, while a shoot-first star's linemates run
    cold. When a playmaking claim is borderline, weight it toward the player.
  young_sample: >-
    The card is a three-year weighted average, so a young player's projection
    rests on a short, recent, still-developing sample. Read both the upside and
    the uncertainty as larger than the point estimate suggests — there is more
    room to grow, and less settled evidence underneath, than the single number
    shows.
  young_sample_rising: >-
    And the trend is pointing up, so the recent, heavier-weighted seasons are
    pulling the projection higher: the upside is real, but lean on it knowing the
    number may be running ahead of a fully settled level.
  # --- Microstat ($10-tier) card caveats -----------------------------------
  micro_single_season: >-
    The microstat card is one season of tracked data at 5v5, per 60 minutes —
    no three-year weighting. A single season of microstats is a smaller,
    noisier sample than the standard card's blended projection, so read every
    number as this season's shape, not a settled level.
  micro_unadjusted: >-
    Microstats are raw tracked rates, not isolated impacts: unlike the WAR
    components, they are not adjusted for teammates, competition, or
    deployment. They describe how a player plays; the WAR row is the better
    read on how much that play is worth.
  micro_style_not_value: >-
    Hits, skating speed, and forecheck involvement are style and engagement
    reads, not value. A low mark describes how he plays, never a value
    weakness — plenty of high-value players rarely hit.

# --- WAR reading anchors (TopDownHockey methodology, distilled 2026-07-18) --
# Two anchors from the model author's own write-up. Articulation only: they
# never move a tier. `replacement_pct` is the percentile where 0 WAR sits
# (37th, per the source: ~37% of players with a decent sample provided
# below-replacement contributions over three seasons).
war_reading:
  replacement_pct: 37
  replacement_note: >-
    Zero WAR (replacement level) sits at roughly the 37th percentile in this
    model, so a projection at or below the 37th means the model's best
    estimate is replacement-level value or worse — not merely "below
    average."
  point_estimate: >-
    A point estimate of value added, not of how good he is — the two can
    differ with usage — read as a central estimate within his own position
    pool. The model author's own framing: WAR is the starting point for a
    discussion, never the ending point.

# --- Young-sample uncertainty (the card is a 3-year weighted average) -------
# A young skater's number rests on a short, recent, still-developing sample, so
# the engine attaches the `young_sample` caveat at or below `max_age` (and pairs
# it with the rising-trend clause when the trajectory points up). Tunable.
age_uncertainty:
  max_age: 22

# --- Trajectory bounciness (articulation only) ------------------------------
# The trajectory read keeps the endpoint-to-endpoint spine, but a series like
# 93 -> 97 -> 92 should not silently read as "holding steady": when an interior
# season breaks past BOTH endpoints (a true peak/dip — a monotonic rise/fall
# can never trip this) AND deviates from the straight endpoint-to-endpoint line
# by more than `bounce_margin` percentile points, the string appends the shape
# ("with a peak season (97th) in between"). NEVER changes tiers or verdicts.
# Calibration: the spec suggested 10, but the real Hughes card's hidden peak
# (93 -> 97 -> 92) deviates from the line by only 4.5 — a margin of 10 hides
# the exact case this exists for. Chart-reading noise is ~1-3 points, so 4
# separates signal from noise. Tune here.
trajectory:
  bounce_margin: 4

# --- Scoring profile: EV offense vs finishing (articulation only) ----------
# Reads play-driving (EV offense — repeatable) against finishing (conversion —
# volatile), both already on the card. This NEVER changes the tier or the WAR
# verdict; it only adds a regression read as an insight. `high_min` is the "high"
# cutoff (matches the Strong band / STRENGTH_MIN); `gap` is the minimum spread
# before a profile is called lop-sided. Tune the numbers and wording here.
scoring_profile:
  high_min: 70
  gap: 10
  shapes:
    both_high:
      label: "Generates and converts — durable"
      note: >-
        High EV offense (play-driving, the repeatable part) sitting under high
        finishing — he generates chances and converts them. The most durable
        offensive profile: the scoring is well-supported by play-driving, so the
        finishing-volatility caveat is tempered here rather than alarming.
    positive_regression:
      label: "Play-driving ahead of finishing — positive-regression candidate"
      note: >-
        High EV offense with finishing lagging behind — he generates chances he
        isn't fully converting. His scoring may be understated; a
        positive-regression candidate if the finishing climbs toward the
        play-driving it already supports.
    negative_regression:
      label: "Conversion-led — negative-regression risk"
      note: >-
        High finishing over only modest EV offense — the scoring leans on
        conversion, which swings year to year. A negative-regression risk if the
        finishing cools, since the play-driving underneath is only ordinary. This
        reinforces the finishing-volatility caveat.

# --- Microstat ($10-tier) card rules ----------------------------------------
# The micro card is a different data regime: single-season 5v5 per-60
# percentiles (microstats from AllThreeZones, WAR components from
# TopDownHockey), no Proj. WAR headline, no deployment context, no trends.
# Skaters only — there is no goalie microstat card.
micro_rules:
  war_row: >-
    The WAR boxes on a microstat card are this season's component percentiles,
    not the standard card's three-year-weighted projection. Same model family,
    different window — never compare a micro card's boxes to a standard
    card's head to head.
  microstat_scope: >-
    Microstats are the how, the WAR row is the how-much. Read the tracked
    columns as an explanation of a player's style and shape, and keep value
    verdicts anchored to the WAR components.

# --- Microstat paired profiles (articulation only) ---------------------------
# Each family reads two (or three) microstats against each other the way the
# tracking methodology says to. Like scoring_profile, these NEVER move a tier
# or verdict — they are the card's built-in style reads. `high_min` matches
# the Strong band / STRENGTH_MIN; `gap` is the minimum spread before a paired
# read is called lop-sided. Tune numbers and wording here.
micro_profiles:
  high_min: 70
  gap: 15
  shot_selectivity:   # chances vs shots
    volume_led:
      label: "Volume shooter — perimeter-heavy"
      note: >-
        Shot attempts run well ahead of legitimate chances, so a lot of the
        volume comes from the perimeter. Players in this dataset convert about
        15.6% of chances versus 1.4% of non-chance attempts — the chance rate
        is the number that matters.
    chance_led:
      label: "Selective shooter — quality over volume"
      note: >-
        Chances run ahead of raw attempts: he is selective, working into
        dangerous areas rather than settling for perimeter volume.
  passing_quality:    # chance_assists vs primary_shot_assists
    funneler:
      label: "Point-funneler — shot assists over chance assists"
      note: >-
        Shot assists run well ahead of chance assists: he moves pucks toward
        attempts (often low-to-high toward the point), which helps sustain
        possession but carries a much lower ceiling — shots off low-to-high
        passes go in only about 2.5% of the time.
    dangerous:
      label: "Dangerous passer — chance assists lead"
      note: >-
        Chance assists lead the passing profile: his passes put teammates in
        legitimate scoring positions and get the goalie moving before the
        shot — the passing shape this model is known to underrate.
  attack_style:       # rush_offense vs in_zone_offense — style, not value
    rush_led:
      label: "Rush-led attack"
      note: >-
        The offense comes off the rush — controlled entries turning directly
        into attempts — more than off cycles and forechecks. A style read,
        not a value verdict.
    cycle_led:
      label: "Cycle/forecheck-led attack"
      note: >-
        The offense comes off in-zone possession — cycles and forechecks —
        more than off the rush. A style read, not a value verdict.
    balanced:
      label: "Balanced attack"
      note: >-
        Rush and in-zone offense sit close together — no strong stylistic
        lean either way.
  rush_defense:       # D only: the three rush-defense metrics read together.
    # Entry Chance Prevention is the most important of the three — it is
    # listed first in the engine's read and breaks the ties here.
    lockdown:
      label: "Shuts the rush down"
      note: >-
        Denies entries at the line, forces dump-ins, and keeps the entries
        that do happen from turning into chances — the full rush-defense
        package.
    tight_gap_walked:
      label: "Tight gap, but gets walked"
      note: >-
        Denies entries and forces dump-ins at a strong rate, but the entries
        that do get in turn into chances too often — a tight gap at the line
        that attackers beat one-on-one.
    soft_gap_slot:
      label: "Soft gap, protects the slot"
      note: >-
        Concedes the blue line — few denials, few forced dump-ins — but keeps
        entries from becoming chances: a soft gap played deliberately to
        protect the slot.
    leaky:
      label: "Rush-defense liability"
      note: >-
        Neither stops entries at the line nor keeps them from turning into
        chances — the rush-defense profile is a genuine soft spot.

# --- Position rules (PLAN section 4) ---------------------------------------
# A defenseman's card may show Finishing, but it is excluded from his projected
# WAR. The engine must never credit a D's WAR to finishing.
position_rules:
  defense:
    war_excludes: ["finishing"]

# --- Goalie reading rules (PLAN section 5) ---------------------------------
goalie_rules:
  danger_split: >-
    High, Med and Low Danger percentiles show where a goalie's value comes
    from. Elite on High Danger but only ordinary on Low Danger means he makes
    the hard saves but is average on routine shots; weak Low Danger is a
    leaking-soft-goals flag. Read the three together as a profile.
  floor_vs_ceiling: >-
    Quality Starts is the floor (gives his team a chance most nights),
    Excellent Starts is the ceiling (steals games), and Bad Starts is the
    disaster rate. Report them as one profile, not three separate numbers.
  consistency_volatility: >-
    Consistency is a volatility flag, not value. A low Consistency percentile
    paired with a steep recent WAR climb means the projection may be riding a
    recent spike rather than a settled level. Goalie performance is the least
    stable thing in the model, so temper every goalie projection with this.
  save_lines: >-
    On the Save% vs Expected Save% chart, read both lines together. When actual
    save percentage holds while expected save percentage falls, the goalie is
    increasingly beating expectation (rising goals saved above expected), which
    is what drives WAR up. Never read either line alone. And remember the
    expected line is a model output on a tracking substrate that has drifted
    across recent seasons — the model is recalibrated season by season, so give
    cross-season level shifts in the gap some slack: part of a move can be
    model-and-tracking drift rather than the goalie.
  rebound_control: >-
    Rebound Control is a discrete skill. Call it out as its own strength or
    weakness, not folded into the danger numbers.

# --- Dimension dictionary: claim language -> card metric (PLAN section 5) --
# `applies_to`: skater | goalie | both. `answerability`: answerable | partial |
# not_answerable. `caveat` references a key under `caveats`. `deployment: true`
# marks a usage metric that is never itself value. Extendable here in YAML.
dimensions:
  - id: finishing
    applies_to: skater
    aliases: ["goal scorer", "finisher", "sniper", "scores goals"]
    metrics: ["finishing", "goals"]
    answerability: answerable
    caveat: finishing_volatility
  - id: playmaking
    applies_to: skater
    aliases: ["playmaker", "passer", "vision", "sets up goals"]
    # first_assists on a standard card; the micro card spells it primary_assists.
    metrics: ["first_assists", "primary_assists"]
    answerability: answerable
    caveat: dangerous_passing
  - id: two_way
    applies_to: skater
    aliases: ["two-way", "shutdown", "responsible", "200-foot", "defensively responsible"]
    metrics: ["ev_defense", "pk"]
    answerability: answerable
    caveat: defense_repeatability
  - id: power_play
    applies_to: skater
    aliases: ["power play weapon", "power play specialist", "man advantage"]
    metrics: ["pp"]
    answerability: answerable
  - id: penalty_kill
    applies_to: skater
    aliases: ["penalty killer", "great on the kill", "shorthanded"]
    metrics: ["pk"]
    answerability: answerable
  - id: discipline
    applies_to: skater
    aliases: ["disciplined", "takes too many penalties", "undisciplined"]
    metrics: ["penalties"]
    answerability: answerable
  - id: overall_skater
    applies_to: skater
    aliases: ["elite", "superstar", "best player", "star"]
    metrics: ["proj_war_pct"]
    answerability: answerable
  - id: competition
    applies_to: skater
    aliases: ["plays tough minutes", "matched against top lines", "hard minutes", "sheltered", "easy minutes", "protected deployment"]
    metrics: ["competition"]
    answerability: answerable
    deployment: true
    caveat: deployment_not_value
  - id: teammates
    applies_to: skater
    aliases: ["carried by his linemates", "helped by his teammates"]
    metrics: ["teammates"]
    answerability: answerable
    deployment: true
    caveat: deployment_not_value
  # --- goalie ---
  - id: game_stealer
    applies_to: goalie
    aliases: ["steals games", "robs people", "highlight reel", "larceny"]
    metrics: ["excellent_starts", "high_danger"]
    answerability: answerable
  - id: soft_goals
    applies_to: goalie
    aliases: ["lets in soft ones", "leaks easy goals", "soft goals"]
    metrics: ["low_danger"]
    answerability: answerable
  - id: reliability
    applies_to: goalie
    aliases: ["gives you a chance every night", "reliable", "steady"]
    metrics: ["quality_starts"]
    answerability: answerable
  - id: no_stinkers
    applies_to: goalie
    aliases: ["never has a stinker", "no bad nights"]
    metrics: ["bad_starts"]
    answerability: answerable
  - id: goalie_consistency
    applies_to: goalie
    aliases: ["consistent", "you know what you'll get"]
    metrics: ["consistency"]
    answerability: answerable
  - id: goalie_rebounds
    applies_to: goalie
    aliases: ["controls rebounds", "no second chances"]
    metrics: ["rebound_control"]
    answerability: answerable
  - id: goalie_pk
    applies_to: goalie
    aliases: ["great on the kill", "shorthanded"]
    metrics: ["penalty_kill"]
    answerability: answerable
  - id: workhorse
    applies_to: goalie
    aliases: ["workhorse", "true starter", "handles the load"]
    metrics: ["gp_pct", "role"]
    answerability: answerable
  - id: overall_goalie
    applies_to: goalie
    aliases: ["elite goalie", "top tier", "vezina"]
    metrics: ["proj_war_pct"]
    answerability: answerable
  # --- microstat card (style claims answerable there) ------------------------
  # These share aliases with the standard card's `skater_style` catch-all on
  # purpose: on a micro card the pool-preference in `_resolve` routes the claim
  # here (answerable, with the number); on a standard card it still lands on
  # `skater_style` (honestly unverifiable).
  - id: skating
    applies_to: micro
    aliases: ["great skater", "fast skater", "speed", "skating speed", "quick", "burner", "can fly"]
    metrics: ["skating_speed"]
    answerability: answerable
    caveat: micro_style_not_value
  - id: physicality
    applies_to: micro
    aliases: ["physical", "big hitter", "throws the body", "hits everything", "power forward", "plays a physical game"]
    metrics: ["hits"]
    answerability: answerable
    caveat: micro_style_not_value
  - id: forechecking
    applies_to: micro
    aliases: ["forechecker", "high motor", "relentless forecheck", "hounds pucks", "wins pucks back", "grinder"]
    metrics: ["forecheck_involvement"]
    answerability: answerable
    caveat: micro_style_not_value
  - id: rush_attack
    applies_to: micro
    aliases: ["rush player", "off the rush", "transition scorer", "north-south", "attacks in transition"]
    metrics: ["rush_offense"]
    answerability: answerable
    caveat: micro_unadjusted
  - id: cycle_game
    applies_to: micro
    aliases: ["cycle game", "in-zone player", "grinds the cycle", "o-zone possession game"]
    metrics: ["in_zone_offense"]
    answerability: answerable
    caveat: micro_unadjusted
  - id: shot_volume
    applies_to: micro
    aliases: ["shoots a lot", "volume shooter", "shoots from everywhere"]
    metrics: ["shots"]
    answerability: answerable
    caveat: micro_unadjusted
  - id: chance_generation
    applies_to: micro
    aliases: ["gets chances", "dangerous shooter", "gets to the middle", "lives in the slot"]
    metrics: ["chances", "chance_contributions"]
    answerability: answerable
    caveat: micro_unadjusted
  - id: dangerous_passing_micro
    applies_to: micro
    aliases: ["dangerous passer", "slot passes", "sets up chances", "gets the goalie moving", "royal road passes"]
    metrics: ["high_danger_passes", "chance_assists"]
    answerability: answerable
    caveat: micro_unadjusted
  - id: entry_driving
    applies_to: micro
    aliases: ["drives entries", "carries the puck in", "gains the zone", "entry machine", "zone entries"]
    metrics: ["entries", "zone_entries", "entry_possession_rate", "entries_w_possession"]
    answerability: answerable
    caveat: micro_unadjusted
  - id: transition_exits
    applies_to: micro
    aliases: ["puck mover", "moves the puck", "breakout passer", "transition game", "zone exits", "gets it out clean"]
    metrics: ["exits", "zone_exits", "exit_possession_rate", "exits_w_possession"]
    answerability: answerable
    caveat: micro_unadjusted
  - id: rush_defense
    applies_to: micro
    aliases: ["defends the rush", "good gap", "kills entries", "tight gap", "hard to enter on", "gets walked"]
    # Entry Chance Prevention first — the most important of the three.
    metrics: ["entry_chance_prevention", "poss_entry_prevention", "entry_denial_rate"]
    answerability: answerable
    caveat: micro_unadjusted
  - id: puck_management
    applies_to: micro
    aliases: ["safe with the puck", "turnover-prone", "puck management", "turns it over", "giveaway machine"]
    metrics: ["success_per_poss_play"]
    answerability: answerable
    caveat: micro_unadjusted
  - id: retrievals
    applies_to: micro
    aliases: ["retrieves pucks", "digs pucks out", "good on retrievals", "first on loose pucks"]
    metrics: ["d_zone_retrievals", "retrieval_success", "d_zone_puck_touches"]
    answerability: answerable
    caveat: micro_unadjusted
  # --- not answerable from a standard card ---
  - id: goalie_style
    applies_to: goalie
    aliases: ["aggressive", "deep in his net", "glove vs blocker", "plays his angles"]
    metrics: []
    answerability: not_answerable
    note: "Goalie playing-style claims are not measured on a standard card."
  - id: net_front
    applies_to: skater
    aliases: ["net-front", "screens", "plays in the blue paint", "sits in front of the net"]
    metrics: []
    answerability: not_answerable
    note: "Shot-location / net-front play is not on a standard card. The $10 microstat card gets closer — Shots off HD Passes marks a player getting to dangerous areas — but literal net-front location isn't tracked on either card."
  - id: skater_style
    applies_to: skater
    aliases: ["rush player", "off the rush", "cycle game", "north-south", "east-west", "physical", "forechecker", "power forward", "great skater", "speed", "high motor", "grinder", "agitator", "pest", "playing style"]
    metrics: []
    answerability: not_answerable
    note: "General playing-style traits are not on a standard card — but several ARE measured on the $10 microstat card: rush vs. cycle offense, zone entries/exits, skating speed, physicality (hits), and forechecking. Supply the player's microstat card to check those; broader style reads (east-west vs. north-south, agitator/pest) still aren't measured on either card."
  - id: team_leading_scorer
    applies_to: both
    aliases: ["team's leading scorer", "team's best", "leading scorer next season"]
    metrics: ["proj_war_pct"]
    answerability: partial
    note: "Depends on the player's team context (roster, role), which the card does not know."
